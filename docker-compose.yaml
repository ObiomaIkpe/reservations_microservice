services:
  reservations:
    build:
      context: .
      dockerfile: ./apps/reservations/Dockerfile
      target: development
    command: pnpm run start:dev reservatio ns
    volumes:
      - .:/usr/src/app
    ports:
      - "3000:3000"
  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
      target: development
    command: pnpm run start:dev auth
    
    ports:
      - '3001:3001'
    volumes:
      - .:/usr/src/app    
  mongo:
    image: mongo